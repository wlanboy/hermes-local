services:

  ollama:
    profiles: [ollama]
    image: ollama/ollama:${OLLAMA_TAG:-latest}
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hermes-net

  hermes-init:
    image: busybox
    volumes:
      - ./config:/source:ro
      - hermes-data:/opt/data
    command: sh -c "cp -r /source/. /opt/data/"

  hermes:
    image: nousresearch/hermes-agent:${HERMES_TAG:-latest}
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # Gateway API
      - "9119:9119"   # Dashboard
    depends_on:
      hermes-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_TUI=1
      - HERMES_DASHBOARD_INSECURE=1
    volumes:
      - hermes-data:/opt/data
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-data:
