services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hermes-net

  hermes:
    build: .
    container_name: hermes
    restart: unless-stopped
    ports:
      - "9119:9119"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Ollama
      - OLLAMA_HOST=http://ollama:11434

      # Telegram (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL:-}

      # Hermes Config
      - HERMES_HUMAN_DELAY_MODE=${HERMES_HUMAN_DELAY_MODE:-false}
      - HERMES_DASHBOARD_TUI=1
    volumes:
      - ./config:/root/.hermes
      - hermes_data:/data
    networks:
      - hermes-net

volumes:
  hermes_data:

networks:
  hermes-net:
    driver: bridge
