services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - hermes-net

  hermes:
    image: nousresearch/hermes-agent:${HERMES_TAG:-latest}
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # Gateway API
      - "9119:9119"   # Dashboard
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_TUI=1
      - HERMES_UID=1000
      - HERMES_GID=1000
    volumes:
      - ./config:/opt/data
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
