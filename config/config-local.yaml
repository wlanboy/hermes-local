model:
  provider: custom
  default: "qwen3.5:4b"
  base_url: "http://ollama:11434/v1"
  api_key: "none"

terminal:
  backend: "local"
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 4000
  user_char_limit: 2000
  nudge_interval: 10
  flush_min_turns: 6

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

group_sessions_per_user: true

agent:
  max_turns: 60
  reasoning_effort: "medium"
  api_max_retries: 1

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: true

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram, session_search]
